set -as terminal-features ',xterm-256color:RGB'
set -g default-terminal "tmux-256color"
set -g default-shell /bin/zsh
set -g history-limit 5000
set -sg escape-time 1
set -g repeat-time 1000
set -g base-index 1
setw -g pane-base-index 1
set -g remain-on-exit off
set -g set-titles on
set -g set-titles-string "#H - #W"

unbind C-b
set -g prefix C-j
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
unbind ^J
bind ^J select-pane -t :.+
unbind ^K
bind ^K select-pane -t :.-
bind ^N next-window
bind ^P previous-window
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g status-interval 30
set -g status-justify left
set -g status-left-length 40
set -g status-left '#[fg=colour062]#S#[fg=colour051] '
set-option -g status-right '#[fg=colour062]#H#[default] %a %b/%d/%y %H:%M'
set -g status-style bg=colour235,fg=white
set-window-option -g window-status-current-style fg=black,bg=colour062
set -g pane-border-style fg=colour235,bg=black
set -g pane-active-border-style fg=colour062,bg=black

%if "#{==:#{host_short},devbox}"
set -g status-style bg=colour235,fg=#b2b2b2
set -g status-left '#[fg=#32acaa,bold]#S#[default] '
set -g status-right '#[fg=#32acaa]#H#[fg=#b2b2b2] %a %b/%d/%y %H:%M'
set -g window-status-format "  #I:#W  "
set -g window-status-current-format "  #I:#W  "
set-window-option -g window-status-current-style fg=#ffffff,bg=#1e6766
set -g pane-active-border-style fg=#32acaa,bg=black
%endif

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g focus-events on
set -g set-clipboard on
