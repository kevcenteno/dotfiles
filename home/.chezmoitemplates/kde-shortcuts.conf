# Curated KDE global shortcuts, applied to ~/.config/kglobalshortcutsrc.
#
# Format: <group>|<action key>|<value>
#   - value is KDE's raw triple: current,default,friendlyName
#   - \t (literal backslash-t) separates multiple key combos; the apply
#     script converts it to a real tab before writing.
# Lines starting with # and blank lines are ignored.
# Edit this file, then `chezmoi apply` to re-apply.

# --- Window tiling: vim-style Meta+Alt+HJKL ---
kwin|Window Quick Tile Left|Meta+Left\tMeta+Alt+H,Meta+Left,Quick Tile Window to the Left
kwin|Window Quick Tile Bottom|Meta+Down\tMeta+Alt+J,Meta+Down,Quick Tile Window to the Bottom
kwin|Window Quick Tile Top|Meta+Up\tMeta+Alt+K,Meta+Up,Quick Tile Window to the Top
kwin|Window Quick Tile Right|Meta+Right\tMeta+Alt+L,Meta+Right,Quick Tile Window to the Right
kwin|Window Minimize|Meta+PgDown\tMeta+Ctrl+Alt+J,Meta+PgDown,Minimize Window
kwin|Window Maximize|Meta+PgUp\tMeta+Ctrl+Alt+K,Meta+PgUp,Maximize Window
kwin|Window Move Center|Meta+Alt+C,none,Move Window to the Center

# --- Media & volume: Meta+Ctrl+Alt alternates for laptop keys ---
kmix|decrease_volume|Volume Down\tMeta+Ctrl+Alt+PgDown,Volume Down,Decrease Volume
kmix|increase_volume|Volume Up\tMeta+Ctrl+Alt+PgUp,Volume Up,Increase Volume
mediacontrol|previousmedia|Media Previous\tMeta+Ctrl+Alt+Left,Media Previous,Media playback previous
mediacontrol|playpausemedia|Media Play\tMeta+Ctrl+Alt+Up,Media Play,Play/Pause media playback
mediacontrol|nextmedia|Media Next\tMeta+Ctrl+Alt+Right,Media Next,Media playback next

# --- Session / power: Ctrl+Alt+Shift, no confirmation ---
ksmserver|Halt Without Confirmation|Ctrl+Alt+Shift+PgDown,none,Shut Down Without Confirmation
ksmserver|Reboot Without Confirmation|Ctrl+Alt+Shift+PgUp,none,Reboot Without Confirmation
ksmserver|Log Out Without Confirmation|Ctrl+Alt+Shift+Del,none,Log Out Without Confirmation
ksmserver|Lock Session|Screensaver\tCtrl+Alt+L\tMeta+L,Screensaver\tMeta+L,Lock Session

# --- Window management misc ---
kwin|Window Close|Alt+Q\tAlt+F4,Alt+F4,Close Window
kwin|Kill Window|Ctrl+Alt+Esc,Meta+Ctrl+Esc,Kill Window
kwin|Activate Window Demanding Attention|Ctrl+Alt+A,Meta+Ctrl+A,Activate Window Demanding Attention
kwin|Switch to Previously Used Desktop|Meta+Tab,none,Switch to Previously Used Desktop
kwin|Walk Through Windows (Reverse)|Alt+Shift+Backtab,Alt+Shift+Tab\tMeta+Shift+Tab,Walk Through Windows (Reverse)

# --- Removals: free the Meta key and F-keys ---
kwin|Expose|Ctrl+F9,Ctrl+F9\tMeta+F9,Toggle Present Windows (Current desktop)
kwin|ExposeAll|Launch (C)\tCtrl+F10,Launch (C)\tCtrl+F10\tMeta+F10,Toggle Present Windows (All desktops)
kwin|ExposeClass|Ctrl+F7,Ctrl+F7\tMeta+F7,Toggle Present Windows (Window class)
kwin|Switch One Desktop Down|none,Meta+Ctrl+Down,Switch One Desktop Down
kwin|Switch One Desktop Up|none,Meta+Ctrl+Up,Switch One Desktop Up
kwin|Switch to Desktop 1|Ctrl+F1,Ctrl+F1\tMeta+F1,Switch to Desktop 1
kwin|Switch to Desktop 2|Ctrl+F2,Ctrl+F2\tMeta+F2,Switch to Desktop 2
kwin|Switch to Desktop 3|Ctrl+F3,Ctrl+F3\tMeta+F3,Switch to Desktop 3
kwin|Switch to Desktop 4|Ctrl+F4,Ctrl+F4\tMeta+F4,Switch to Desktop 4
kwin|Walk Through Windows|Alt+Tab,Alt+Tab\tMeta+Tab,Walk Through Windows
kwin|Walk Through Windows of Current Application|Alt+`,Alt+`\tMeta+`,Walk Through Windows of Current Application
kwin|Walk Through Windows of Current Application (Reverse)|Alt+~,Alt+~\tMeta+~,Walk Through Windows of Current Application (Reverse)
kwin|view_actual_size|none,Meta+0,Zoom to Actual Size
kwin|view_zoom_in|Meta+=,Meta++\tMeta+=,Zoom In
kmix|mic_mute|Microphone Mute,Microphone Mute\tMeta+Volume Mute,Mute Microphone
KDE Keyboard Layout Switcher|Switch to Last-Used Keyboard Layout|none,Meta+Alt+L,Switch to Last-Used Keyboard Layout
plasmashell|activate application launcher|Meta,Meta\tAlt+F1,Activate Application Launcher
plasmashell|show-on-mouse-pos|none,Meta+V,Show Clipboard Items at Mouse Position
